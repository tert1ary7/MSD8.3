<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSD v8.4 | Calibrated Core-Periphery Topology</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="msd-container">
        <aside class="service-fleet">
            <div class="panel-header" onclick="loadMacroView()" style="cursor:pointer;" title="Click to reset view">
                <span>LICENSE FLEET</span>
                <span class="btn-toggle">VIEW ALL</span>
            </div>
            <div class="hex-grid" id="service-grid">
                </div>
        </aside>

        <main class="topology-viewer">
            <header class="viewer-header core-breath" id="core-panel">
                <div>
                    <h1 id="view-title">MACRO FLEET VIEW</h1>
                    <h2 id="view-subtitle">GLOBAL QUORUM OVERVIEW</h2>
                </div>
                <div class="latency-legend">
                    <span class="legend-item"><div class="dot active"></div> ONLINE</span>
                    <span class="legend-item"><div class="dot drop"></div> FAULT</span>
                </div>
            </header>

            <div class="map-container">
                <svg id="topology-layer" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid slice">
                    <defs>
                        <filter id="conduit-blur" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                        </filter>
                    </defs>
                    
                    <g id="layer-map-underlay"></g>
                    
                    <g id="layer-quorum-links"></g>
                    <g id="layer-client-links"></g>
                    <g id="layer-plasma"></g> 
                    <g id="layer-nodes"></g>
                </svg>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
